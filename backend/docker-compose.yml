version: "3.9"

services:
  db:
    image: postgres:15
    container_name: recipevault-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: recipevault
      POSTGRES_PASSWORD: recipevault
      POSTGRES_DB: recipevault
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: